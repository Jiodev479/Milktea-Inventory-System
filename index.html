<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JERE Inventory System - Sign In</title>
    <link rel="stylesheet" href="signin.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <!-- LEFT PANEL -->
      <div class="left-panel">
        <div class="brand-chip">Milk Tea Inventory System</div>
        <h1>ERYX</h1>
        <p>
          Manage your inventory with clarity and serve sucess daily.<br />こーひー
        </p>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <!-- LOGO -->
        <div class="logo-wrap">
          <img
            src="https://www.image2url.com/r2/default/images/1776610701499-f7ee1d04-fff0-4f6c-99ea-56e049b9f97e.webp"
            alt="System Logo"
            onerror="this.style.display = 'none'"
          />
        </div>

        <div class="form-title">WELCOME</div>
        <div class="form-sub">Access your JERE dashboard</div>

        <!-- FORM -->
        <form id="loginForm">
          <!-- USERNAME -->
          <div class="field-wrap">
            <span class="field-icon">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input
              type="text"
              id="username"
              placeholder="Username"
              autocomplete="username"
            />
          </div>

          <!-- PASSWORD -->
          <div class="field-wrap pw-wrap">
            <span class="field-icon">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input
              type="password"
              id="password"
              placeholder="Password"
              autocomplete="current-password"
            />
            <button type="button" class="eye-btn" id="togglePassword">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

          <!-- SIGN IN BUTTON -->
          <button type="submit" class="btn-signin">Sign In</button>

          <!-- ERROR MESSAGE -->
          <p class="error-msg" id="errorMessage"></p>
        </form>

        <!-- DIVIDER -->
        <div class="divider">or</div>

        <!-- SIGN UP -->
        <div class="signup-row">
          Don't have an account?
          <a href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <script src="signin.js"></script>
  </body>
</html>
