<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JERE Inventory System - Sign Up</title>
    <link rel="stylesheet" href="signup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- LEFT PANEL -->
      <div class="left-panel">
        <div class="brand-chip">Milk Tea Inventory System</div>
        <h1>Join<br />ERYX</h1>
        <p>
          Create your account and start managing your milktea inventory with
          ease.
        </p>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <!-- LOGO -->
        <div class="logo-wrap">
          <img
            src="https://www.image2url.com/r2/default/images/1776610701499-f7ee1d04-fff0-4f6c-99ea-56e049b9f97e.webp"
            alt="System Logo"
            onerror="this.style.display = 'none'"
          />
        </div>

        <div class="form-title">CREATE ACCOUNT</div>
        <div class="form-sub">Set up your JERE dashboard access</div>

        <form id="signupForm">
          <!-- USERNAME -->
          <div class="field-wrap">
            <span class="field-icon">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input
              type="text"
              id="newUsername"
              placeholder="Username"
              autocomplete="username"
            />
          </div>

          <!-- PASSWORD -->
          <div class="field-wrap">
            <span class="field-icon">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input
              type="password"
              id="newPassword"
              placeholder="Password"
              autocomplete="new-password"
              oninput="checkStrength()"
            />
            <button
              type="button"
              class="eye-btn"
              onclick="togglePw('newPassword', this)"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

          <!-- STRENGTH BAR -->
          <div class="strength-wrap" id="strengthWrap" style="display: none">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>

          <!-- CONFIRM PASSWORD -->
          <div class="field-wrap">
            <span class="field-icon">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm Password"
              autocomplete="new-password"
            />
            <button
              type="button"
              class="eye-btn"
              onclick="togglePw('confirmPassword', this)"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>

          <button type="submit" class="btn-signin">Create Account</button>
          <p class="error-msg" id="signupError"></p>
        </form>

        <div class="divider">or</div>
        <div class="signup-row">
          Already have an account? <a href="signin.html">Sign In</a>
        </div>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
